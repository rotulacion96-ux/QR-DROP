<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-Drop - Transferencia Bidireccional</title>
    <!-- Tailwind CSS para un diseño limpio y rápido -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- PeerJS para la conexión P2P -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- QRCode.js para generar el código QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Transición suave para el cambio de tema */
        body { transition: background-color 0.3s, color 0.3s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Selector de Tema (Esquina Superior Derecha) -->
    <div class="absolute top-4 right-4">
        <button id="theme-toggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 hover:scale-110 transition-transform cursor-pointer" title="Cambiar Tema">
            <span id="theme-icon-dark" class="hidden">🌙</span>
            <span id="theme-icon-light">☀️</span>
        </button>
    </div>

    <main class="w-full max-w-md bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-xl space-y-6 text-center">
        <header>
            <h1 class="text-3xl font-extrabold tracking-tight text-indigo-600 dark:text-indigo-400">QR-Drop</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Transferencia local bidireccional P2P</p>
        </header>

        <!-- SECCIÓN 1: Generar QR (Esperando Conexión) -->
        <div id="setup-section" class="space-y-4">
            <div class="flex justify-center">
                <div id="qrcode" class="p-4 bg-white rounded-xl shadow-md border border-gray-100 inline-block"></div>
            </div>
            <p class="text-sm font-medium animate-pulse text-indigo-500">Escanea este QR desde el otro dispositivo para conectar...</p>
            <div class="text-xs text-gray-400 break-all bg-gray-100 dark:bg-gray-700 p-2 rounded">
                Tu ID: <span id="my-id" class="font-mono">Generando...</span>
            </div>
        </div>

        <!-- SECCIÓN 2: Panel de Control (Conectado) -->
        <div id="transfer-section" class="hidden space-y-6">
            <div class="bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 p-3 rounded-xl text-sm font-semibold flex items-center justify-center gap-2">
                <span>🔄</span> ¡Dispositivos Vinculados con Éxito!
            </div>

            <!-- Zona de Envío -->
            <div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-4 hover:border-indigo-500 dark:hover:border-indigo-400 transition-colors relative">
                <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <div class="space-y-2 pointer-events-none">
                    <span class="text-3xl">📁</span>
                    <p class="text-sm font-medium">Toca o arrastra un archivo aquí para enviarlo</p>
                </div>
            </div>

            <!-- Progreso de Envío/Recepción -->
            <div id="progress-container" class="hidden space-y-2 text-left">
                <div class="flex justify-between text-xs font-semibold">
                    <span id="progress-status">Transfiriendo...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-indigo-600 h-2.5 rounded-full w-0 transition-all duration-100"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-6 text-xs text-gray-400">
        Seguro • Directo • Sin Servidores intermediarios
    </footer>

    <script>
        // --- GESTIÓN DE TEMA (CLARO / OSCURO) ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-icon-dark');
        const lightIcon = document.getElementById('theme-icon-light');

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            darkIcon.classList.remove('hidden');
            lightIcon.classList.add('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            darkIcon.classList.add('hidden');
            lightIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                darkIcon.classList.add('hidden');
                lightIcon.classList.remove('hidden');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                darkIcon.classList.remove('hidden');
                lightIcon.classList.add('hidden');
            }
        });

        // --- LÓGICA DE CONEXIÓN P2P (PEERJS) ---
        let peer = null;
        let conn = null;
        let receivedChunks = [];
        let incomingFileInfo = null;

        // Detectar si entramos con un ID de destino en la URL (?peer=ID)
        const urlParams = new URLSearchParams(window.location.search);
        const targetPeerId = urlParams.get('peer');

        // Inicializar PeerJS
        peer = new Peer();

        peer.on('open', (id) => {
            document.getElementById('my-id').textContent = id;
            
            if (targetPeerId) {
                // Somos el dispositivo que escaneó: Nos conectamos al remitente
                connectToPeer(targetPeerId);
            } else {
                // Somos el dispositivo origen: Generamos el QR con nuestra URL completa
                const connectionUrl = `${window.location.origin}${window.location.pathname}?peer=${id}`;
                new QRCode(document.getElementById("qrcode"), {
                    text: connectionUrl,
                    width: 200,
                    height: 200,
                    colorDark : "#4f46e5",
                    colorLight : "#ffffff"
                });
            }
        });

        // Escuchar conexiones entrantes (El creador del QR recibe la llamada)
        peer.on('connection', (connection) => {
            conn = connection;
            setupConnectionHandlers();
        });

        function connectToPeer(targetId) {
            conn = peer.connect(targetId);
            setupConnectionHandlers();
        }

        function setupConnectionHandlers() {
            conn.on('open', () => {
                // Intercambiar pantallas al conectar
                document.getElementById('setup-section').classList.add('hidden');
                document.getElementById('transfer-section').classList.remove('hidden');
            });

            conn.on('data', (data) => {
                // Manejo de flujo de datos estructurado
                if (data.type === 'metadata') {
                    // Inicializar recepción de un archivo
                    incomingFileInfo = data;
                    receivedChunks = [];
                    showProgress("Recibiendo: " + data.name);
                } else if (data.type === 'chunk') {
                    // Guardar fragmento binario
                    receivedChunks.push(data.chunk);
                    const percent = Math.round((receivedChunks.length / incomingFileInfo.totalChunks) * 100);
                    updateProgress(percent);

                    if (receivedChunks.length === incomingFileInfo.totalChunks) {
                        // Descarga Directa Forzada usando Blobs asíncronos
                        const blob = new Blob(receivedChunks, { type: incomingFileInfo.mime });
                        const blobUrl = URL.createObjectURL(blob);
                        
                        const downloadAnchor = document.createElement('a');
                        downloadAnchor.href = blobUrl;
                        downloadAnchor.download = incomingFileInfo.name;
                        document.body.appendChild(downloadAnchor);
                        downloadAnchor.click();
                        
                        // Limpieza inmediata del DOM y memoria
                        document.body.removeChild(downloadAnchor);
                        URL.revokeObjectURL(blobUrl);
                        
                        hideProgress();
                        alert(`¡Archivo "${incomingFileInfo.name}" descargado con éxito!`);
                    }
                }
            });

            conn.on('close', () => {
                alert("Conexión perdida. Recargando la página.");
                window.location.search = ""; // Limpiar parámetros y reiniciar
            });
        }

        // --- MANEJO DE ENVÍO DE ARCHIVOS ---
        const fileInput = document.getElementById('file-input');
        const CHUNK_SIZE = 16384; // 16KB por fragmento para máxima estabilidad WebRTC

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file || !conn) return;

            showProgress("Enviando: " + file.name);

            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
            
            // Enviar Metadatos primero
            conn.send({
                type: 'metadata',
                name: file.name,
                mime: file.type,
                totalChunks: totalChunks
            });

            let currentChunk = 0;
            const fileReader = new FileReader();

            fileReader.onload = (event) => {
                conn.send({
                    type: 'chunk',
                    chunk: event.target.result
                });

                currentChunk++;
                const percent = Math.round((currentChunk / totalChunks) * 100);
                updateProgress(percent);

                if (currentChunk < totalChunks) {
                    loadNextChunk();
                } else {
                    hideProgress();
                    fileInput.value = ""; // Reset del input
                    alert("¡Archivo enviado de forma segura!");
                }
            };

            function loadNextChunk() {
                const start = currentChunk * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, file.size);
                const blobSlice = file.slice(start, end);
                fileReader.readAsArrayBuffer(blobSlice);
            }

            loadNextChunk();
        });

        // --- FUNCIONES AUXILIARES DE INTERFAZ ---
        const progressContainer = document.getElementById('progress-container');
        const progressStatus = document.getElementById('progress-status');
        const progressPercent = document.getElementById('progress-percent');
        const progressBar = document.getElementById('progress-bar');

        function showProgress(statusText) {
            progressContainer.classList.remove('hidden');
            progressStatus.textContent = statusText;
            updateProgress(0);
        }

        function updateProgress(percent) {
            progressPercent.textContent = percent + "%";
            progressBar.style.width = percent + "%";
        }

        function hideProgress() {
            progressContainer.classList.add('hidden');
        }
    </script>
</body>
</html>
